<style>
:root{--main:#1a5c9a;--sub:#0f355a;--accent:#f5a623;--bg:#f3f8ff;--light:#eef7ff;--line:#cfe4f8;--text:#102033;--green:#1f9d55;--red:#e53e3e;--shadow:0 10px 28px rgba(26,92,154,.14)}
*{box-sizing:border-box} body{margin:0;padding:12px;background:var(--bg);font-family:'Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;color:var(--text)}
#app{max-width:480px;min-height:96vh;margin:0 auto;background:#fff;border-radius:24px;overflow:hidden;box-shadow:var(--shadow)}
.header{background:linear-gradient(135deg,var(--main),var(--sub));color:#fff;text-align:center;padding:22px 14px 18px}
.header h1{margin:0;font-size:20px;font-weight:900} .header p{margin:6px 0 0;font-size:13px;opacity:.92}
.tabs{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;padding:10px;background:#fff;border-bottom:1px solid #e6eef7}
.tab{border:0;border-radius:12px;padding:12px 2px;min-height:46px;background:#edf2f7;color:#31455f;font-size:12px;font-weight:900} .tab.active{background:var(--main);color:#fff}
.section{display:none;padding:16px} .section.active{display:block}
.card{background:#fff;border:2px solid var(--line);border-radius:18px;padding:14px;margin-bottom:12px}

.btn{width:100%;border:0;border-radius:14px;padding:14px 12px;min-height:48px;background:var(--main);color:#fff;font-size:15px;font-weight:900;box-shadow:0 4px 12px rgba(26,92,154,.18)}
.btn.secondary{background:#edf2f7;color:#26364a;box-shadow:none} .btn.green{background:var(--green)} .btn.red{background:var(--red)} .btn.orange{background:var(--accent);color:#4e3200}
.status{display:inline-block;background:#edf2f7;border-radius:999px;padding:7px 12px;font-size:13px;font-weight:900;color:#31455f;margin-bottom:10px}
.progress{height:12px;background:#d9ecff;border-radius:999px;overflow:hidden} .bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--main));width:0;transition:.35s}
.word{font-size:30px;font-weight:900;color:var(--main);text-align:center;line-height:1.25;margin:18px 0}
.grid{display:grid;gap:10px}
.opt,.choice{width:100%;text-align:left;background:#fff;border:2px solid var(--line);border-radius:14px;padding:14px;font-size:15px;font-weight:800;color:var(--text)}
.choice.selected{border-color:var(--main);background:#eef7ff} .choice.correct,.opt.correct{background:#d8f3df;border-color:var(--green);color:#156b35} .choice.wrong,.opt.wrong{background:#fde8e8;border-color:var(--red);color:#a3281a}
.meaning{background:#eef7ff;border-left:5px solid var(--main);border-radius:13px;padding:14px;line-height:1.65;font-weight:900;color:#0f355a}

.answer,.chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;min-height:56px} .answer{border:2px dashed var(--main);background:#f5fbff;border-radius:14px;padding:10px;margin:10px 0}
.chip{background:#fff;border:2px solid #b9d9f5;border-radius:10px;padding:10px 12px;font-weight:900;font-size:14px;touch-action:manipulation;user-select:none} .chip.used{opacity:.35}
.tip{background:#fff8df;border:1px solid #f5d67b;border-radius:12px;padding:9px 11px;font-size:12px;line-height:1.5;font-weight:800;color:#7a5500;margin:8px 0}
.explain{display:none;border:2px solid var(--accent);background:#fffdf6;border-radius:14px;padding:13px;margin-top:12px;line-height:1.65} .explain.show{display:block}
.hist-card{border:2px solid var(--line);border-radius:16px;padding:13px;margin-bottom:10px;background:#fff} .hist-title{font-weight:900;color:var(--main);margin-bottom:6px} .hist-val{font-size:20px;font-weight:900;color:var(--green)}
.wrong-item{display:flex;justify-content:space-between;align-items:center;background:#fff5f5;border-left:5px solid var(--red);border-radius:12px;padding:11px;margin-bottom:8px}
.passage-line{padding:9px 0;border-bottom:1px dashed #d9e8f5;line-height:1.65} .speaker{font-weight:900;color:var(--main)}
.listenBox{position:sticky;top:0;z-index:3;background:#fff;padding-bottom:8px;border-bottom:1px solid #e6eef7;margin-bottom:8px}
.listbox{max-height:240px;overflow:auto;border:1px solid #e6eef7;border-radius:12px;padding:8px;background:#f8fbff;font-size:12px;line-height:1.45} .listbox div{padding:5px;border-bottom:1px dotted #d9e8f5}
.evo-card{position:relative;overflow:hidden;background:linear-gradient(135deg,#fffdf4,#eef7ff);border:2px solid #f0d98b;border-radius:18px;padding:14px;margin-bottom:12px}
.evo-card::after{content:'';position:absolute;right:-30px;top:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(245,166,35,.16),transparent 70%)}
.evo-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.evo-icon{font-size:52px;line-height:1;filter:drop-shadow(0 6px 10px rgba(0,0,0,.12))} .evo-name{font-size:18px;font-weight:900;color:#7a5500} .evo-sub{font-size:12px;color:#7b6a38;font-weight:800;line-height:1.45}
.evo-badge{display:inline-block;background:#fff7d4;border:1px solid #f5d67b;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:900;color:#7a5500}
.toast{position:fixed;left:50%;top:18px;transform:translateX(-50%);z-index:30;background:#102033;color:#fff;padding:12px 16px;border-radius:14px;font-weight:900;box-shadow:0 10px 24px rgba(0,0,0,.22);opacity:0;pointer-events:none;transition:.25s} .toast.show{opacity:1}
.footnote{font-size:12px;color:#64748b;line-height:1.5}
@media(max-width:420px){.tabs{grid-template-columns:repeat(3,1fr)} .row{flex-direction:column} .word{font-size:26px} .evo-top{align-items:flex-start} .evo-icon{font-size:46px}}
</style>

<div id="app">

<script>
const DATA = {"passageSentences": [{"speaker": "Brian", "en": "The election is coming up.", "ko": "선거가 다가오고 있어."}, {"speaker": "Brian", "en": "Why don't you run for class representative, Yumi?", "ko": "반 대표에 입후보하는 게 어때, 유미야?"}, {"speaker": "Yumi", "en": "No way.", "ko": "말도 안 돼."}, {"speaker": "Yumi", "en": "I'm not the right person for that position.", "ko": "나는 그 자리에 적절한 사람이 아니야."}, {"speaker": "Yumi", "en": "I've never thought about running.", "ko": "나는 입후보하는 것에 대해 생각해 본 적이 없어."}, {"speaker": "Brian", "en": "Why not?", "ko": "왜?"}, {"speaker": "Yumi", "en": "Come on, Brian.", "ko": "이봐, Brian."}, {"speaker": "Yumi", "en": "Leaders have special qualities.", "ko": "리더들은 특별한 자질을 갖추고 있어."}, {"speaker": "Yumi", "en": "I don't think a person like me can be called a leader.", "ko": "난 나 같은 사람이 리더라고 불릴 수 있다고 생각하지 않아."}, {"speaker": "Brian", "en": "What do you mean?", "ko": "무슨 말이야?"}, {"speaker": "Brian", "en": "I think you have very good leadership qualities.", "ko": "내 생각에 너는 매우 좋은 지도력 자질을 갖추고 있어."}, {"speaker": "Brian", "en": "You're really friendly and outgoing.", "ko": "너는 정말 친절하고 외향적이잖아."}, {"speaker": "Brian", "en": "You also help people get along.", "ko": "또 너는 사람들이 어울리도록 도와주기도 해."}, {"speaker": "Brian", "en": "I have no doubt that you will be elected if you run.", "ko": "만약 네가 입후보한다면 당선될 거라고 믿어 의심치 않아."}, {"speaker": "Yumi", "en": "Brian told me this afternoon that I have good leadership qualities.", "ko": "Brian은 오늘 오후에 내게 내가 좋은 지도력 자질을 갖추고 있다고 말했다."}, {"speaker": "Yumi", "en": "No one has ever told me that before.", "ko": "이전에는 아무도 내게 그런 말을 한 적이 없다."}, {"speaker": "Yumi", "en": "Why does he think so?", "ko": "왜 그는 그렇게 생각할까?"}, {"speaker": "Yumi", "en": "Maybe he was just trying to be nice.", "ko": "어쩌면 그는 그저 친절하려고 했던 걸지도 모른다."}, {"speaker": "Yumi", "en": "When he said that to me, however, I started to think.", "ko": "그러나 그가 내게 그렇게 말했을 때, 나는 생각하기 시작했다."}, {"speaker": "Yumi", "en": "Can I really become a leader?", "ko": "내가 정말 리더가 될 수 있을까?"}, {"speaker": "Yumi", "en": "I don't know.", "ko": "나는 모르겠다."}, {"speaker": "Yumi", "en": "I think leaders should have a vision, clear goals, and the ability to motivate others.", "ko": "나는 리더가 비전, 명확한 목표, 그리고 다른 사람들에게 동기를 부여하는 능력을 가지고 있어야 한다고 생각한다."}, {"speaker": "Yumi", "en": "I don't have any of those things.", "ko": "나는 그러한 것들 중 어느 것도 가지고 있지 않다."}, {"speaker": "Yumi", "en": "Then I suddenly started to wonder if these are the only qualities that make a good leader.", "ko": "그때 나는 갑자기 이것들이 좋은 리더를 만드는 유일한 자질들인지 궁금해지기 시작했다."}, {"speaker": "Yumi", "en": "Maybe I'm wrong.", "ko": "어쩌면 내가 틀린지도 모른다."}, {"speaker": "Yumi", "en": "Maybe there are other leadership qualities.", "ko": "어쩌면 다른 지도력 자질들이 있는지도 모른다."}, {"speaker": "Yumi", "en": "So I decided to do some research online.", "ko": "그래서 나는 온라인으로 조사를 좀 해 보기로 결심했다."}, {"speaker": "Yumi", "en": "Here's what I found!", "ko": "여기에 내가 찾은 것이 있다!"}, {"speaker": "Text", "en": "Green leaders are team builders.", "ko": "녹색 리더는 팀 조직자이다."}, {"speaker": "Text", "en": "They ensure that the team feels valued.", "ko": "그들은 반드시 팀이 존중받고 있다고 느끼게 한다."}, {"speaker": "Text", "en": "They create a positive environment.", "ko": "그들은 긍정적인 환경을 조성한다."}, {"speaker": "Text", "en": "They are friendly and easy to talk to.", "ko": "그들은 친절하고 대화하기 쉽다."}, {"speaker": "Text", "en": "Red leaders are logical analysts.", "ko": "빨간색 리더는 논리적 분석가이다."}, {"speaker": "Text", "en": "They have good reasoning skills.", "ko": "그들은 훌륭한 추론 기술을 갖고 있다."}, {"speaker": "Text", "en": "They analyze problems and situations.", "ko": "그들은 문제와 상황을 분석한다."}, {"speaker": "Text", "en": "They think of the most effective ways to achieve the team's goals.", "ko": "그들은 팀의 목표를 성취하는 가장 효과적인 방법들을 생각한다."}, {"speaker": "Text", "en": "Purple leaders are hands-off managers.", "ko": "보라색 리더는 방임적 관리자이다."}, {"speaker": "Text", "en": "They allow others to work on their own.", "ko": "그들은 다른 사람들이 스스로 일하도록 해 준다."}, {"speaker": "Text", "en": "They do not try to control people.", "ko": "그들은 사람들을 통제하려고 하지 않는다."}, {"speaker": "Text", "en": "They give advice only when it is needed.", "ko": "그들은 필요할 때만 조언한다."}, {"speaker": "Text", "en": "Orange leaders are strict directors.", "ko": "주황색 리더는 엄격한 감독관이다."}, {"speaker": "Text", "en": "They make everyone's role clear.", "ko": "그들은 모두의 역할을 분명하게 해 준다."}, {"speaker": "Text", "en": "They make sure everything is finished on time.", "ko": "그들은 반드시 모든 일이 제때 끝나도록 한다."}, {"speaker": "Text", "en": "They ensure each step is done properly.", "ko": "그들은 각 단계가 반드시 적절히 이행되도록 한다."}, {"speaker": "Text", "en": "Yellow leaders are quiet supporters.", "ko": "노란색 리더는 조용한 지지자이다."}, {"speaker": "Text", "en": "They lead by example.", "ko": "그들은 솔선수범한다."}, {"speaker": "Text", "en": "They let the team members shine instead.", "ko": "그들은 팀원들이 대신 빛나도록 해 준다."}, {"speaker": "Text", "en": "They meet the team members' needs.", "ko": "그들은 팀원들의 요구 사항을 충족한다."}, {"speaker": "Text", "en": "Blue leaders are creative thinkers.", "ko": "파란색 리더는 창조적 사상가이다."}, {"speaker": "Text", "en": "They approach problems in new ways.", "ko": "그들은 새로운 방식으로 문제에 접근한다."}, {"speaker": "Text", "en": "They come up with fresh ideas.", "ko": "그들은 신선한 아이디어를 떠올린다."}, {"speaker": "Text", "en": "They deal with tasks differently from others.", "ko": "그들은 다른 사람들과 다르게 일을 처리한다."}, {"speaker": "Yumi", "en": "I was surprised that there are actually many different leadership styles, but soon I realized the reason.", "ko": "나는 실제로 서로 다른 여러 가지 지도력 유형들이 있다는 사실에 놀랐지만, 곧 그 이유를 깨달았다."}, {"speaker": "Yumi", "en": "We belong to many different groups, and many different situations can come up in our lives.", "ko": "우리는 여러 다른 집단에 속해 있고, 우리 인생에서는 서로 다른 많은 상황들이 발생할 수 있다."}, {"speaker": "Yumi", "en": "They all call for different leadership styles.", "ko": "그것들은 모두 서로 다른 지도력 유형들을 필요로 한다."}, {"speaker": "Yumi", "en": "Each group's unique situation determines the best leadership style.", "ko": "각 집단의 독특한 상황이 최적의 지도력 유형을 결정한다."}, {"speaker": "Yumi", "en": "I am a part of many different groups, and I have different responsibilities in each group.", "ko": "나는 서로 다른 여러 집단의 일부이고, 각 집단에서 각각 다른 책임을 맡고 있다."}, {"speaker": "Yumi", "en": "After reading everything, I became more confident.", "ko": "모든 것을 읽고 나서, 나는 더 자신감이 생겼다."}, {"speaker": "Yumi", "en": "I discovered that I have some of the qualities of a green leader.", "ko": "나는 내가 녹색 리더의 자질들 중 일부를 가지고 있다는 것을 알게 되었다."}, {"speaker": "Yumi", "en": "If my classmates think a green leader would make our class better, they might pick me to be class representative!", "ko": "만약 나의 반 친구들이 녹색 리더가 우리 반을 더 좋게 만들 거라고 생각한다면, 그들은 반 대표로 나를 뽑을지도 모른다!"}, {"speaker": "Yumi", "en": "Okay, let's try it!", "ko": "좋아, 시도해 보자!"}], "wordList": [{"en": "election", "ko": "선거"}, {"en": "come up", "ko": "다가오다, 발생하다"}, {"en": "run for", "ko": "~에 입후보하다"}, {"en": "representative", "ko": "대표"}, {"en": "position", "ko": "자리, 직책"}, {"en": "leadership", "ko": "지도력"}, {"en": "quality", "ko": "자질, 특성"}, {"en": "outgoing", "ko": "외향적인"}, {"en": "get along", "ko": "잘 지내다, 어울리다"}, {"en": "have no doubt", "ko": "의심하지 않다, 확신하다"}, {"en": "elect", "ko": "선출하다"}, {"en": "vision", "ko": "비전, 전망"}, {"en": "motivate", "ko": "동기를 부여하다"}, {"en": "wonder", "ko": "궁금해하다"}, {"en": "research", "ko": "조사, 연구"}, {"en": "ensure", "ko": "반드시 ~하게 하다, 보장하다"}, {"en": "valued", "ko": "존중받는"}, {"en": "positive", "ko": "긍정적인"}, {"en": "logical", "ko": "논리적인"}, {"en": "analyst", "ko": "분석가"}, {"en": "reasoning skill", "ko": "추론 기술"}, {"en": "analyze", "ko": "분석하다"}, {"en": "effective", "ko": "효과적인"}, {"en": "achieve", "ko": "성취하다"}, {"en": "hands-off", "ko": "방임적인, 간섭하지 않는"}, {"en": "on one's own", "ko": "스스로"}, {"en": "control", "ko": "통제하다"}, {"en": "strict", "ko": "엄격한"}, {"en": "director", "ko": "감독관, 지휘자"}, {"en": "properly", "ko": "적절히"}, {"en": "lead by example", "ko": "솔선수범하다"}, {"en": "supporter", "ko": "지지자"}, {"en": "approach", "ko": "접근하다"}, {"en": "come up with", "ko": "~을 떠올리다, 생각해 내다"}, {"en": "deal with", "ko": "~을 처리하다"}, {"en": "differently", "ko": "다르게"}, {"en": "belong to", "ko": "~에 속하다"}, {"en   if(btn.dataset.sec==='dict'){
    dictAutoMode=true;
    setTimeout(()=>startLoop(),80);
  } else {
    stopLoop();
  }
});

// speech
let selectedEnglishVoice=null, speaking=false, paused=false, currentUtterance=null;
function loadEnglishVoice(){
 const voices=window.speechSynthesis?window.speechSynthesis.getVoices():[];
 selectedEnglishVoice=voices.find(v=>v.lang==='en-US' && /samantha|alex|ava|allison|english|google us/i.test(v.name))||voices.find(v=>v.lang==='en-US')||voices.find(v=>v.lang&&v.lang.startsWith('en'))||null;
}
if('speechSynthesis' in window){loadEnglishVoice();window.speechSynthesis.onvoiceschanged=loadEnglishVoice;}
function stopSpeech(){try{window.speechSynthesis.cancel();}catch(e){} speaking=false; paused=false; currentUtterance=null;}
function speak(text,rate=.8,onend=null){ if(!('speechSynthesis' in window)){if(onend)onend();return;} stopSpeech(); const u=new SpeechSynthesisUtterance(text); currentUtterance=u; u.lang='en-US'; u.rate=rate; u.pitch=1; if(selectedEnglishVoice) u.voice=selectedEnglishVoice; u.onend=()=>{speaking=false; currentUtterance=null; if(onend)onend();}; speaking=true; try{window.speechSynthesis.speak(u)}catch(e){speaking=false; if(onend)onend();} }
function pauseOrResumeSpeech(){ if(!('speechSynthesis' in window))return; if(window.speechSynthesis.speaking && !window.speechSynthesis.paused){window.speechSynthesis.pause();paused=true;} else if(window.speechSynthesis.paused){window.speechSynthesis.resume();paused=false;} }

function stageByPct(p){ if(p>=100) return COW_STAGES[4]; if(p>=75) return COW_STAGES[3]; if(p>=50) return COW_STAGES[2]; if(p>=25) return COW_STAGES[1]; return COW_STAGES[0]; }
function evoCard(kind,pct,done,total){ const st=stageByPct(pct); return `<div class="evo-card"><div class="evo-top"><div><div class="evo-name">${kind==='word'?'단어 소 성장':'영작 소 성장'}</div><div class="evo-sub">${st.desc}<br>${done} / ${total} 진행</div><div class="evo-badge">${st.name}</div></div><div class="evo-icon">${st.icon}</div></div><div style="margin-top:10px" class="progress"><div class="bar" style="width:${pct}%"></div></div></div>`; }
function celebrateStage(kind,pct){ const key='_stage_'+kind; const cur=stageByPct(pct).name; const prev=loadObj(key,''); if(prev!==cur){ saveObj(key,cur); if(pct>0){ conf(); toast(`${kind==='word'?'단어':'영작'} 성장! ${cur}`); } } }

// body listening
let listenIndex=0, listenRepeat=0, listenRunning=false;
function updateListenBar(){ const total=Math.max(1,DATA.passageSentences.length); $('listenBar').style.width=`${Math.round((listenIndex/total)*100)}%`; saveObj('_listen',{last:listenIndex,total:DATA.passageSentences.length,time:today()}); }
function renderPassage(){ $('passageWrap').innerHTML=DATA.passageSentences.map((s,i)=>`<div class="passage-line"><span class="speaker">${s.speaker}:</span> ${s.en}<br><span class="sentence-small">${s.ko}</span></div>`).join(''); }
function runListen(){ if(!listenRunning) return; if(listenIndex>=DATA.passageSentences.length){ $('listenStatus').textContent='완료!'; listenRunning=false; stopSpeech(); conf(); updateListenBar(); return; } const s=DATA.passageSentences[listenIndex]; $('listenStatus').textContent=`${listenIndex+1} / ${DATA.passageSentences.length} · 3회 중 ${listenRepeat+1}회`; speak(s.en,.82,()=>{ if(!listenRunning) return; if(listenRepeat<2){ listenRepeat++; runListen(); } else { listenIndex++; listenRepeat=0; updateListenBar(); setTimeout(runListen,400); } }); }
$('listenStart').onclick=()=>{ listenIndex=0; listenRepeat=0; listenRunning=true; updateListenBar(); runListen(); toast('본문 듣기를 시작합니다.'); };
$('listenPause').onclick=()=>{ pauseOrResumeSpeech(); $('listenPause').textContent = window.speechSynthesis && window.speechSynthesis.paused ? '▶ 다시재생' : '⏸ 일시정지'; };
$('listenStop').onclick=()=>{ listenRunning=false; stopSpeech(); $('listenStatus').textContent='정지됨'; $('listenPause').textContent='⏸ 일시정지'; updateListenBar(); };

// WORD
let wList=[],wIdx=0,wOK=0,wBusy=false;
function renderWordIntro(){ const st=loadObj('_wordStats',{attempts:0,best:0}); $('wordWrap').innerHTML=`${evoCard('word',0,0,DATA.wordList.length)}<div class="bluecard"><b>핵심 단어 테스트</b><br>영어 단어를 보고 뜻을 고르세요. 틀린 단어는 오답에 저장됩니다.</div><div class="footnote">누적 시도: ${st.attempts}회 · 최고 점수: ${st.best}점</div><button class="btn" id="wordStart">단어 시작</button>`; $('wordStart').onclick=startWord; }
function startWord(){ wList=shuffle(DATA.wordList); wIdx=0; wOK=0; loadWord(); }
function loadWord(){ if(wIdx>=wList.length) return finishWord(); wBusy=false; const q=wList[wIdx]; const opts=shuffle([q.ko,...shuffle(DATA.wordList.filter(x=>x.ko!==q.ko)).slice(0,3).map(x=>x.ko)]); const pct=Math.round((wIdx/Math.max(1,wList.length))*100); $('wordWrap').innerHTML=`${evoCard('word',pct,wIdx,wList.length)}<span class="status">${wIdx+1} / ${wList.length}</span><div class="progress"><div class="bar" style="width:${pct}%"></div></div><div class="word">${q.en}</div><div class="grid" id="wopts"></div><button class="btn secondary" id="wordSpeak">🔊 단어 듣기</button>`; $('wordSpeak').onclick=()=>speak(q.en,.82); opts.forEach(o=>{ const b=document.createElement('button'); b.className='opt'; b.textContent=o; b.onclick=()=>{ if(wBusy) return; wBusy=true; const ok=o===q.ko; if(ok){ b.classList.add('correct'); wOK++; celebrateStage('word',Math.round(((wIdx+1)/wList.length)*100)); } else { b.classList.add('wrong'); saveWrong(q); Array.from($('wopts').children).forEach(x=>{if(x.textContent===q.ko)x.classList.add('correct')}); } setTimeout(()=>{ wIdx++; loadWord(); },650); }; $('wopts').appendChild(b); }); }
function finishWord(){ const total=wList.length||1; const sc=Math.round(wOK/total*100); const stats=loadObj('_wordStats',{attempts:0,best:0}); stats.attempts+=1; stats.best=Math.max(stats.best||0,sc); saveObj('_wordStats',stats); saveObj('_word',{score:sc,correct:wOK,total:total,time:today()}); celebrateStage('word',100); $('wordWrap').innerHTML=`${evoCard('word',100,total,total)}<div class="card" style="text-align:center"><div style="font-size:54px">🐂</div><h2 style="margin:8px 0 6px">단어 완료</h2><div class="hist-val">${sc}점</div><p>${wOK} / ${total}</p><button class="btn" id="wAgain">다시하기</button></div>`; $('wAgain').onclick=renderWordIntro; }
function saveWrong(w){ const arr=loadObj('_wrong',[]); if(!arr.find(x=>x.en===w.en)){ arr.push(w); saveObj('_wrong',arr); } }

// DICTATION
let dIdx=0, autoLoop=false, dictAutoMode=false, dictPaused=false, loopTimer=null, loopSortableA=null, loopSortableB=null;
function dictPct(){ return Math.round((dIdx/Math.max(1,DATA.dictationList.length))*100); }
function stopLoop(){
  autoLoop=false;
  dictPaused=false;
  clearTimeout(loopTimer);
  try{ window.speechSynthesis.cancel(); }catch(e){}
}
function startLoop(){
  clearTimeout(loopTimer);
  dictPaused=false;
  autoLoop=true;
  const item=DATA.dictationList[dIdx];
  if(!item) return;
  const pauseBtn=$('dictPause');
  if(pauseBtn) pauseBtn.textContent='⏸ 일시정지';
  const play=()=>{
    if(!autoLoop || dictPaused) return;
    speak(item.en,.76,()=>{
      if(autoLoop && !dictPaused) loopTimer=setTimeout(play,900);
    });
  };
  play();
}
function pauseDictLoop(){
  if(!autoLoop){
    dictAutoMode=true;
    startLoop();
    return;
  }
  if(!dictPaused){
    dictPaused=true;
    try{ window.speechSynthesis.pause(); }catch(e){}
    const b=$('dictPause'); if(b) b.textContent='▶ 이어듣기';
  }else{
    dictPaused=false;
    try{ window.speechSynthesis.resume(); }catch(e){}
    const b=$('dictPause'); if(b) b.textContent='⏸ 일시정지';
  }
}
function buildDictOptions(words){ return shuffle(words.slice()); }
function renderDict(){ const item=DATA.dictationList[dIdx]||DATA.dictationList[0]; if(!item) return; const pct=dictPct(); $('dictWrap').innerHTML=`${evoCard('dict',pct,dIdx,DATA.dictationList.length)}<div class="status">영작 ${dIdx+1} / ${DATA.dictationList.length} · 문장 ${item.sentenceNo}${item.totalParts>1?`-${item.partNo}/${item.totalParts}`:''}</div><div class="meaning">${item.ko}</div><div class="tip">영작 문장은 자동으로 반복 재생됩니다. 정답을 맞히면 자동으로 다음 문장으로 넘어갑니다. 터치 또는 드래그로 단어를 옮길 수 있어요.</div><div class="row"><button class="btn secondary" id="dictPause">⏸ 일시정지</button></div><div class="answer" id="answer"></div><div class="chips" id="chips"></div><div id="dictMsg"></div><details><summary class="sentence-small">전체 문장 보기</summary><div class="bluecard">${item.full}<br>${item.koFull}</div></details>`; const words=buildDictOptions(item.en.replace(/[.,!?“”"']/g,'').split(/\s+/).filter(Boolean)); words.forEach(w=>{ const c=document.createElement('button'); c.type='button'; c.className='chip'; c.textContent=w; c.onclick=()=>moveChip(c); $('chips').appendChild(c); });
 $('dictPause').onclick=pauseDictLoop;
 if(dictAutoMode && document.getElementById('dict').classList.contains('active')) setTimeout(()=>startLoop(),80);
 if(window.Sortable){ if(loopSortableA) loopSortableA.destroy(); if(loopSortableB) loopSortableB.destroy(); loopSortableA=new Sortable($('answer'),{group:'dict',animation:180,ghostClass:'sortable-ghost',dragClass:'sortable-drag',onSort:checkDict,onAdd:checkDict,onEnd:checkDict}); loopSortableB=new Sortable($('chips'),{group:'dict',animation:180,ghostClass:'sortable-ghost',dragClass:'sortable-drag',onSort:checkDict,onAdd:checkDict,onEnd:checkDict}); }
 saveObj('_dict_current',{idx:dIdx+1,total:DATA.dictationList.length,sentence:item.sentenceNo,part:item.partNo,time:today()});
 }
function moveChip(c){ const ans=$('answer'), chips=$('chips'); if(c.parentElement===chips) ans.appendChild(c); else chips.appendChild(c); checkDict(); }
function checkDict(){ const item=DATA.dictationList[dIdx]; const made=Array.from($('answer').children).map(x=>x.textContent).join(' '); const target=item.en.replace(/[.,!?“”"']/g,''); if(norm(made)===norm(target)){ stopLoop(); celebrateStage('dict',Math.round(((dIdx+1)/DATA.dictationList.length)*100)); $('dictMsg').innerHTML='<div class="bluecard" style="border-left-color:var(--green)">정답입니다! 다음 문장으로 이동합니다.</div>'; const st=loadObj('_dict_stats',{solved:0,total:DATA.dictationList.length,done:0}); st.solved=Math.max(st.solved,dIdx+1); st.done=(st.done||0)+1; st.time=today(); saveObj('_dict_stats',st); saveObj('_dict_current',{idx:dIdx+1,total:DATA.dictationList.length,sentence:item.sentenceNo,part:item.partNo,done:true,time:today()}); setTimeout(()=>{ if(dIdx<DATA.dictationList.length-1){ dIdx++; renderDict(); } else { conf(); $('dictWrap').innerHTML=`${evoCard('dict',100,DATA.dictationList.length,DATA.dictationList.length)}<div class="card" style="text-align:center"><div style="font-size:54px">👑🐂</div><h2 style="margin:8px 0 6px">영작 완료</h2><p>모든 문장을 정확히 맞혔어요!</p><button class="btn" id="dictRestart">처음부터 다시하기</button></div>`; $('dictRestart').onclick=()=>{ dIdx=0; dictAutoMode=true; renderDict(); }; } },650); } }

// GRAMMAR objective MC
let gIdx=0, gSelected='';
function renderGrammar(){ const q=DATA.grammarList[gIdx]; if(!q){ $('grammarWrap').innerHTML='<div class="card"><h2 style="margin:0 0 10px">어법 완료!</h2><button class="btn" id="gRestart">처음부터 다시하기</button></div>'; $('gRestart').onclick=()=>{gIdx=0; renderGrammar();}; return; } const options=shuffle(q.mcOptions); $('grammarWrap').innerHTML=`<div class="bluecard"><b>객관식 어법 문제</b><br>한 문제씩 풀고, 정답 확인 후 해설을 읽은 뒤 다음으로 넘어가세요.</div><span class="status">어법 ${q.no} / ${DATA.grammarList.length}</span><div class="progress"><div class="bar" style="width:${Math.round((gIdx/DATA.grammarList.length)*100)}%"></div></div><div class="card"><div style="font-size:16px;font-weight:900;color:var(--main);line-height:1.55;margin-bottom:10px">${q.prompt}</div><div class="grid" id="gchoices"></div><button class="btn" id="gcheck">정답 확인</button><div class="explain" id="gex"></div></div>`; gSelected=''; options.forEach((o,i)=>{ const b=document.createElement('button'); b.className='choice'; b.dataset.val=o; b.innerHTML=`<b>${['①','②','③','④'][i]||'•'}</b> ${escapeHtml(o)}`; b.onclick=()=>{ gSelected=o; document.querySelectorAll('#gchoices .choice').forEach(x=>x.classList.remove('selected')); b.classList.add('selected'); }; $('gchoices').appendChild(b); }); $('gcheck').onclick=checkGrammar; }
function checkGrammar(){ const q=DATA.grammarList[gIdx]; const ok=norm(gSelected)===norm(q.answer); document.querySelectorAll('#gchoices .choice').forEach(b=>{ if(norm(b.dataset.val)===norm(q.answer)) b.classList.add('correct'); else if(norm(b.dataset.val)===norm(gSelected) && !ok) b.classList.add('wrong'); b.disabled=true; }); const rec=loadObj('_grammar',{last:0,correct:0,total:0,time:''}); rec.last=Math.max(rec.last,q.no); rec.total+=1; if(ok) rec.correct+=1; rec.time=today(); saveObj('_grammar',rec); $('gex').classList.add('show'); $('gex').innerHTML=`<b>${ok?'정답 ⭕':'오답 ❌'}</b><br>정답: <b>${q.answer}</b><br>${q.note}<button class="btn green" id="gnext" style="margin-top:10px">해설 읽고 다음 문제</button>`; $('gnext').onclick=()=>{ gIdx++; renderGrammar(); }; if(ok) conf(); }

// RECORD & WRONG
function renderRecord(){ const word=loadObj('_word',null), wordStats=loadObj('_wordStats',{attempts:0,best:0}), dict=loadObj('_dict_current',null), dictStats=loadObj('_dict_stats',{solved:0,total:DATA.dictationList.length,done:0}), gram=loadObj('_grammar',null), listen=loadObj('_listen',null), wrong=loadObj('_wrong',[]); $('recordWrap').innerHTML=`<div class="hist-card"><div class="hist-title">본문 3번 듣기</div><div class="hist-val">${listen?`${listen.last} / ${DATA.passageSentences.length}문장`:'기록 없음'}</div><div class="sentence-small">${listen?.time||''}</div></div><div class="hist-card"><div class="hist-title">단어</div><div class="hist-val">${word?`${word.score}점`:'기록 없음'}</div><div class="sentence-small">최근: ${word?`${word.correct}/${word.total}`:''} · 시도 ${wordStats.attempts}회 · 최고 ${wordStats.best}점</div></div><div class="hist-card"><div class="hist-title">영작</div><div class="hist-val">${dict?`${dict.idx} / ${dict.total}`: '기록 없음'}</div><div class="sentence-small">마지막: 문장 ${dict?.sentence||'-'}${dict?.part?`-${dict.part}`:''} · 누적 정답 처리 ${dictStats.done||0}회 · ${dict?.time||''}</div></div><div class="hist-card"><div class="hist-title">어법</div><div class="hist-val">${gram?`${gram.last} / ${DATA.grammarList.length}`: '기록 없음'}</div><div class="sentence-small">정답 누적 ${gram?.correct||0} / ${gram?.total||0} · ${gram?.time||''}</div></div><div class="hist-card"><div class="hist-title">오답 단어</div><div class="hist-val">${wrong.length}개</div></div><button class="btn red" id="clearRecord">기록 전체 초기화</button>`; $('clearRecord').onclick=()=>{ if(confirm('기록을 모두 지울까요?')){ Object.keys(localStorage).filter(k=>k.startsWith(STORE)).forEach(k=>localStorage.removeItem(k)); renderRecord(); renderWordIntro(); dIdx=0; renderDict(); gIdx=0; renderGrammar(); } }; }
function renderWrong(){ const arr=loadObj('_wrong',[]); if(!arr.length){ $('wrongWrap').innerHTML='<div class="bluecard">오답 단어가 없습니다.</div>'; return; } $('wrongWrap').innerHTML=arr.map((w,i)=>`<div class="wrong-item"><div><b>${w.en}</b><br><span class="sentence-small">${w.ko}</span></div><button class="btn secondary" style="width:auto;min-height:36px;padding:8px 10px" data-del="${i}">삭제</button></div>`).join('') + '<button class="btn red" id="clearWrong">전체 비우기</button>'; document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{ const a=loadObj('_wrong',[]); a.splice(Number(b.dataset.del),1); saveObj('_wrong',a); renderWrong(); }); $('clearWrong').onclick=()=>{ saveObj('_wrong',[]); renderWrong(); }; }

renderPassage(); renderWordIntro(); renderDict(); renderGrammar();
</script>
</body>
</html>
